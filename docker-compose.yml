services:
  postgres:
    image: postgres:16
    container_name: oncall_postgres
    environment:
      POSTGRES_USER: oncall
      POSTGRES_PASSWORD: oncall
      POSTGRES_DB: oncall_companion
    ports:
      - "5438:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/internal/db/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oncall -d oncall_companion"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
    container_name: oncall_api
    environment:
      PORT: 8080
      DATABASE_URL: postgres://oncall:oncall@postgres:5432/oncall_companion?sslmode=disable
      AI_PROVIDER:
      OPENAI_API_KEY:
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
